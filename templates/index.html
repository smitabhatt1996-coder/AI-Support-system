<!DOCTYPE html>
<html>
<head>
    <title> AI Support</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 12px;
            width: 60%;
            margin: auto;
        }

        input {
            padding: 12px;
            width: 70%;
        }

        button {
            padding: 12px;
            background: #243b55;
            color: white;
            border: none;
        }

        pre {
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<h1>🧠  AI Support Assistant</h1>

<div class="box">
    <form method="POST">
        <input type="text" name="query"
        placeholder="Describe your issue" required>
        <br><br>
        <button type="submit">Get Solution</button>
    </form>

    <pre>{{ result }}</pre>
</div>

</body>
</html>
